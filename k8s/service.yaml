apiVersion: v1
kind: Service
metadata:
  name: kuberesilience-service
spec:
  selector:
    app: kuberesilience-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kuberesilience-config
data:
  LOG_LEVEL: "INFO"
  K8S_CONTEXT: "cluster-admin"
  RESILIENCE_MODE: "aggressive"
  TARGET_NAMESPACE: "default"
