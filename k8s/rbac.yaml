apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuberesilience-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuberesilience-role
  namespace: default
rules:
- apiGroups: ["", "apps"]
  resources: ["pods", "deployments", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuberesilience-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: kuberesilience-sa
  namespace: default
roleRef:
  kind: Role
  name: kuberesilience-role
  apiGroup: rbac.authorization.k8s.io
